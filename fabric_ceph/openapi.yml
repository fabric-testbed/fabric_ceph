openapi: 3.0.3
info:
  title: Ceph Dashboard – Auth & Cluster User API
  version: 1.0.0
  description: |
    Minimal OpenAPI definition for building an app around Ceph Dashboard REST endpoints used to
    manage CephX users and CephFS subvolumes, and to authenticate via JWT. These paths mirror the
    documented `/api` surface (as commonly exposed by the Ceph Dashboard).

servers:
  - description: Local development server
    url: http://localhost:3500
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/RENCI3/ceph/1.0.0
  - url: https://{host}:{port}/api
    variables:
      host:
        default: mgr.example.org
      port:
        default: "8443"

tags:
  - name: Cluster Info
  - name: Cluster User
  - name: CephFS
  - name: version

paths:

  /version:
    get:
      tags: [version]
      summary: Version
      description: Version
      operationId: version_get
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/version'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cluster/info:
    get:
      tags: [Cluster Info]
      summary: Get FSID and monitor endpoints for all clusters
      operationId: listClusterInfo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterInfoList"
        "400":
          description: Bad Request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_400_bad_request' }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_401_unauthorized' }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_403_forbidden' }
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_500_internal_server_error' }

  /cluster/user:
    get:
      tags: [Cluster User]
      summary: List all CephX users
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/users"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

    post:
      tags: [Cluster User]
      summary: Upsert a CephX user with cluster-specific capabilities (templated)
      description: >
        Creates or updates a CephX user and synchronizes the SAME SECRET across clusters.
        Capability strings may include placeholders `{fs}`, `{path}`, `{group}`, `{subvol}` which
        are rendered per cluster using subvolume info (getpath).
      operationId: applyUserTemplated
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserTemplatedRequest'
      responses:
        "200":
          description: Summary of synchronization results and per-cluster applied caps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyUserResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found (e.g., subvolume missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

    put:
      tags: [Cluster User]
      summary: Overwrite capabilities for an existing CephX user (non-templated)
      description: >
        Overwrites a user's capabilities with the provided list. Commonly used to adjust a single
        component (e.g., `mds`) while preserving others (`mon`, `osd`, `mgr`).
      operationId: overwriteUserCaps
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserCapsRequest'
      responses:
        "200":
          description: OK (caps updated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "201":
          description: Created (if implementation creates missing user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cluster/user/{entity}:
    delete:
      tags: [Cluster User]
      summary: Delete a CephX user
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: entity
          required: true
          schema:
            type: string
          description: CephX entity, e.g., `client.demo`
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cluster/user/export:
    post:
      tags: [Cluster User]
      summary: Export keyring(s) for one or more CephX users
      operationId: exportUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportUsersRequest'
            examples:
              single:
                value:
                  entities: ["client.demo"]
              multiple:
                value:
                  entities: ["client.alice","client.bob"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportUsersResponse"
            text/plain:
              schema:
                type: string
              examples:
                concatenated:
                  value: |
                    [client.kthare10_0011904101]
                        key = AQApM+Bo...
                        caps mds = "allow ..."
                        ...
                    [client.pruth_0031379841]
                        key = AQAXPuBo...
                        caps mds = "allow ..."
                        ...

  /cephfs/subvolume/{vol_name}:
    get:
      tags: [CephFS]
      summary: List subvolumes
      description: |
        Lists subvolumes for a filesystem. If `group_name` is passed, results
        are filtered to that group. When `info=true`, implementations may
        return detailed objects instead of simple names.
      operationId: listSubvolumes
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema: { type: string }
          description: CephFS volume name (filesystem)
        - in: query
          name: group_name
          required: false
          schema: { type: string }
        - in: query
          name: info
          required: false
          schema:
            type: boolean
            default: false
          description: When true, return detailed objects per subvolume if supported.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubvolumeList' }
        "400":
          description: Bad Request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_400_bad_request' }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_401_unauthorized' }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_403_forbidden' }
        "404":
          description: Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_404_not_found' }
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_500_internal_server_error' }

    put:
      tags: [CephFS]
      summary: Create or resize a subvolume
      description: >
        Creates a new subvolume (if it does not exist) or resizes an existing one.
        Omit `size` to create without a quota (unlimited). Send `size` (bytes) to set/resize the quota.
      operationId: createOrResizeSubvolume
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema:
            type: string
          description: CephFS volume name (filesystem), e.g. `CEPH-FS-01`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubvolumeCreateOrResizeRequest'
            examples:
              createNoQuota:
                value:
                  subvol_name: alice
                  group_name: fabric_staff
                  mode: "0777"
              createWithQuota:
                value:
                  subvol_name: bob
                  group_name: fabric_staff
                  size: 10737418240
                  mode: "0770"
              resize:
                value:
                  subvol_name: bob
                  group_name: fabric_staff
                  size: 536870912
      responses:
        "200":
          description: OK (created or resized)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

    delete:
      tags: [CephFS]
      summary: Delete a subvolume
      operationId: deleteSubvolume
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema:
            type: string
          description: CephFS volume name (filesystem)
        - in: query
          name: subvol_name
          required: true
          schema:
            type: string
        - in: query
          name: group_name
          required: false
          schema:
            type: string
        - in: query
          name: force
          required: false
          schema:
            type: boolean
            default: false
          description: Force delete even if snapshots exist (behavior depends on cluster policy)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cephfs/subvolume/{vol_name}/info:
    get:
      tags: [CephFS]
      summary: Get subvolume info (path)
      description: Returns subvolume details; use the `path` field as the mount path (equivalent to `getpath`).
      operationId: getSubvolumeInfo
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema:
            type: string
          description: CephFS volume name (filesystem)
        - in: query
          name: subvol_name
          required: true
          schema:
            type: string
        - in: query
          name: group_name
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cephfs/subvolume/{vol_name}/exists:
    get:
      tags: [CephFS]
      summary: Check whether a subvolume exists
      operationId: subvolumeExists
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema:
            type: string
        - in: query
          name: subvol_name
          required: true
          schema:
            type: string
        - in: query
          name: group_name
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubvolumeExists'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cephfs/subvolume/group/{vol_name}:
    get:
      tags: [CephFS]
      summary: List subvolume groups
      description: |
        Lists subvolume groups for a filesystem. When `info=true`, implementations
        may return detailed objects per group; otherwise names.
      operationId: listSubvolumeGroups
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema: { type: string }
          description: CephFS volume name (filesystem)
        - in: query
          name: info
          required: false
          schema:
            type: boolean
            default: false
          description: When true, return detailed objects per group if supported.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubvolumeGroupList' }
        "400":
          description: Bad Request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_400_bad_request' }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_401_unauthorized' }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_403_forbidden' }
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_500_internal_server_error' }
    delete:
      tags: [CephFS]
      summary: Delete a subvolume group
      operationId: deleteSubvolumeGroup
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema:
            type: string
          description: CephFS volume name (filesystem)
        - in: query
          name: group_name
          required: false
          schema:
            type: string
        - in: query
          name: force
          required: false
          schema:
            type: boolean
            default: false
          description: Force delete even if snapshots exist (behavior depends on cluster policy)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

components:

  parameters:
    clusterParam:
      name: cluster
      in: query
      required: true
      description: Target cluster/region identifier as defined by the service config.
      schema:
        type: string
        example: europe

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # -------- Status / Version --------
    version:
      type: object
      allOf:
        - $ref: '#/components/schemas/status_200_ok_single'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/version_data'
    version_data:
      required: [reference, version]
      properties:
        reference:
          type: string
          example: https://github.com/fabric-testbed/fabric_ceph
        version:
          type: string
          example: 1.0.0
      example: null

    status_200_ok_single:
      type: object
      properties:
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 200
        type:
          type: string

    status_200_ok_no_content:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/status_200_ok_no_content_data'
        type:
          type: string
          default: no_content
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 200

    status_200_ok_paginated:
      type: object
      properties:
        limit:
          type: integer
        offset:
          type: integer
        size:
          type: integer
        status:
          type: integer
          default: 200
        total:
          type: integer
        type:
          type: string

    status_400_bad_request:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/status_400_bad_request_errors'

    status_401_unauthorized:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/status_401_unauthorized_errors'
        type:
          type: string
          default: error
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 401

    status_403_forbidden:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/status_403_forbidden_errors'
        type:
          type: string
          default: error
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 403

    status_404_not_found:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/status_404_not_found_errors'
        type:
          type: string
          default: error
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 404

    status_500_internal_server_error:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/status_500_internal_server_error_errors'
        type:
          type: string
          default: error
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 500

    status_200_ok_no_content_data:
      type: object
      properties:
        message:
          type: string
          default: No Content
        details:
          type: object
      example:
        details: details
        message: No Content

    status_400_bad_request_errors:
      type: object
      properties:
        message:
          type: string
          default: Bad Request
        details:
          type: string
        type:
          type: string
          default: error
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 400
      example: null

    status_401_unauthorized_errors:
      type: object
      properties:
        message:
          type: string
          default: Unauthorized
        details:
          type: string
      example: null

    status_403_forbidden_errors:
      type: object
      properties:
        message:
          type: string
          default: Forbidden
        details:
          type: string
      example: null

    status_404_not_found_errors:
      type: object
      properties:
        message:
          type: string
          default: Not Found
        details:
          type: string
      example: null

    status_500_internal_server_error_errors:
      type: object
      properties:
        message:
          type: string
          default: Internal Server Error
        details:
          type: string
      example: null

    # -------- Users / Caps --------
    Capability:
      type: object
      required: [entity, cap]
      properties:
        entity:
          type: string
          description: One of mon|osd|mds|mgr (commonly mon/osd/mds)
          example: mds
        cap:
          type: string
          description: Capability string, e.g. `allow rw`, `allow r fsname=CEPH-FS-01 path=/volumes/_nogroup/demo`
          example: "allow rw"

    CapabilityKV:
      type: object
      required: [type, value]
      properties:
        type:
          type: string
          description: One of mon|osd|mds|mgr
          example: mds
        value:
          type: string
          description: Capability string, e.g. `allow rw`, `allow r fsname=CEPH-FS-01 path=/volumes/_nogroup/demo`
          example: "allow rw fsname=CEPH-FS-01 path=/volumes/_nogroup/demo"

    CapabilityTemplate:
      type: object
      required: [entity, cap]
      properties:
        entity: { type: string, example: mds, description: "One of mon|osd|mds|mgr" }
        cap:    { type: string, example: "allow rw fsname={fs} path={path}" }

    CapRenderContext:
      type: object
      required: [fs_name, subvol_name]
      properties:
        fs_name:     { type: string, example: CEPH-FS-01 }
        subvol_name: { type: string, example: project123 }
        group_name:  { type: string, nullable: true, example: fabric_staff }

    CreateUserTemplatedRequest:
      type: object
      required: [user_entity, template_capabilities, renders]
      properties:
        user_entity:
          type: string
          example: client.project123
        template_capabilities:
          type: array
          items: { $ref: '#/components/schemas/CapabilityTemplate' }
        renders:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/CapRenderContext' }
          description: >
            Multiple subvolumes (possibly in different groups). Server will expand the MDS
            template for each context and merge them into one 'mds' cap string using commas.
        mergeStrategy:
          type: string
          enum: [multi, replace]
          default: multi
        sync_across_clusters:
          type: boolean
          default: true
        preferred_source:
          type: string
          example: europe
          description: Preferred source cluster when user doesn't already exist.

    UpdateUserCapsRequest:
      type: object
      required: [user_entity, capabilities]
      properties:
        user_entity:
          type: string
          example: client.demo
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityKV'
          description: >
            Complete set of caps to apply (overwrites existing). Provide one entry per component.

    ApplyUserResponse:
      type: object
      properties:
        user_entity: { type: string, example: client.project123 }
        fs_name:     { type: string, example: CEPH-FS-01 }
        subvol_name: { type: string, example: project123 }
        group_name:  { type: string, nullable: true }
        source_cluster:     { type: string, example: europe }
        created_on_source:  { type: boolean }
        updated_on_source:  { type: boolean }
        imported_to:
          type: array
          items: { type: string }
          description: Clusters where the keyring was imported
        caps_applied:
          type: object
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/Capability' }
          description: Map cluster → rendered caps actually applied
        paths:
          type: object
          additionalProperties: { type: string }
          description: Map cluster → resolved subvolume path
        errors:
          type: object
          additionalProperties: { type: string }
          description: Map cluster → error string (if any)

    users:
      type: object
      allOf:
        - $ref: '#/components/schemas/status_200_ok_paginated'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CephUser'

    CephUser:
      type: object
      properties:
        user_entity:
          type: string
          example: client.demo
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/Capability'
        keys:
          type: array
          items:
            type: object
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true

    ExportUsersRequest:
      type: object
      required: [entities]
      properties:
        entities:
          type: array
          description: List of CephX entities to export
          items:
            type: string
          example: ["client.demo","client.alice"]

    ExportUsersResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/status_200_ok_single'
        - type: object
          properties:
            type:
              type: string
              default: keyrings
            clusters:
              $ref: '#/components/schemas/ClusterKeyringsMap'

    ClusterKeyringsMap:
      description: Map of cluster name → keyring map
      type: object
      additionalProperties:
        $ref: '#/components/schemas/EntityKeyringMap'

    EntityKeyringMap:
      description: Map of CephX entity → keyring text
      type: object
      additionalProperties:
        type: string

    # -------- CephFS / Subvolumes --------
    SubvolumeCreateOrResizeRequest:
      type: object
      required: [subvol_name]
      properties:
        subvol_name:
          type: string
          description: Subvolume name to create or resize
        group_name:
          type: string
          description: Optional subvolume group name
        size:
          type: integer
          format: int64
          description: >
            Quota in **bytes**. Omit to create without quota (unlimited).
            Send a value to set or resize quota.
          example: 10737418240
        mode:
          type: string
          description: >
            POSIX mode string for initial create (octal), e.g. `"0777"`. Ignored on resize.
          pattern: "^[0-7]{3,4}$"
          example: "0777"

    SubvolumeExists:
      type: object
      properties:
        exists:
          type: boolean
      example:
        exists: true

    SubvolumeSummary:
      type: object
      description: Minimal subvolume info when `info=true` is supported.
      properties:
        name:        { type: string, example: alice }
        group_name:  { type: string, nullable: true, example: fabric_staff }
        path:        { type: string, nullable: true, example: /volumes/_nogroup/alice/uuid }
        bytes_quota: { type: integer, format: int64, nullable: true, example: 10737418240 }
        bytes_used:  { type: integer, format: int64, nullable: true, example: 1048576 }
        state:       { type: string, nullable: true, example: complete }

    SubvolumeList:
      type: object
      allOf:
        - $ref: '#/components/schemas/status_200_ok_paginated'
        - type: object
          properties:
            type:
              type: string
              example: subvolumes
            data:
              type: array
              description: |
                When `info=false` (default), items are names (strings).
                When `info=true`, items may be detailed objects.
              items:
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/SubvolumeSummary'

    SubvolumeGroupSummary:
      type: object
      description: Minimal subvolume group info when `info=true` is supported.
      properties:
        group_name: { type: string, example: fabric_staff }
        path:       { type: string, nullable: true, example: /volumes/fabric_staff }

    SubvolumeGroupList:
      type: object
      allOf:
        - $ref: '#/components/schemas/status_200_ok_paginated'
        - type: object
          properties:
            type:
              type: string
              example: subvolume_groups
            data:
              type: array
              description: |
                When `info=false`, items are names (strings).
                When `info=true`, items may be detailed objects.
              items:
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/SubvolumeGroupSummary'

    # -------- Cluster Info --------
    ClusterInfoList:
      allOf:
        - $ref: '#/components/schemas/status_200_ok_paginated'
        - type: object
          properties:
            type:
              type: string
              example: cluster_info
            data:
              type: array
              items:
                $ref: '#/components/schemas/ClusterInfoItem'

    ClusterInfoItem:
      type: object
      properties:
        cluster:
          type: string
          example: europe
        fsid:
          type: string
          example: "13371194-879b-11f0-b06f-fa163e08d592"
        mons:
          type: array
          items:
            type: object
            properties:
              name: { type: string, example: mon.a }
              v2:   { type: string, nullable: true, example: "10.138.254.2:3300/0" }
              v1:   { type: string, nullable: true, example: "10.138.254.2:6789/0" }
        mon_host:
          type: string
          example: "[v2:10.138.254.2:3300/0,v1:10.138.254.2:6789/0] [v2:10.135.254.2:3300/0,v1:10.135.254.2:6789/0]"
        ceph_conf_minimal:
          type: string
          example: |
            [global]
              fsid = 13371194-879b-11f0-b06f-fa163e08d592
              mon_host = [v2:10.138.254.2:3300/0,v1:10.138.254.2:6789/0] [v2:10.135.254.2:3300/0,v1:10.135.254.2:6789/0]
        error:
          type: string
          nullable: true