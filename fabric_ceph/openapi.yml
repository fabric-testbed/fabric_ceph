openapi: 3.0.3
info:
  title: Ceph Dashboard – Auth & Cluster User API
  version: 1.0.0
  description: |
    Minimal OpenAPI definition for building an app around Ceph Dashboard REST endpoints used to
    manage CephX users and CephFS subvolumes, and to authenticate via JWT. These paths mirror the
    documented `/api` surface (as commonly exposed by the Ceph Dashboard).

servers:
  - description: Local development server
    url: http://localhost:3500
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/RENCI3/ceph/1.0.0
  - url: https://{host}:{port}/api
    variables:
      host:
        default: mgr.example.org
      port:
        default: "8443"

tags:
  - name: Cluster Info
  - name: Cluster User
  - name: CephFS
  - name: version
  - name: S3 User
  - name: S3 Bucket
  - name: S3 Policy
paths:

  # ---------- S3 USERS ----------
  /s3/user:
    get:
      tags: [S3 User]
      summary: List RGW (S3) users
      operationId: listS3Users
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: query
          name: uid
          required: false
          schema: { type: string }
          description: Filter by a specific user id (exact match)
        - in: query
          name: search
          required: false
          schema: { type: string }
          description: Case-insensitive substring match on uid or display_name
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, default: 100 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/S3UserList' }
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/status_401_unauthorized' }}}}
        "403": { description: Forbidden,    content: { application/json: { schema: { $ref: '#/components/schemas/status_403_forbidden' }}}}
        "500": { description: Internal Server Error, content: { application/json: { schema: { $ref: '#/components/schemas/status_500_internal_server_error' }}}}

    post:
      tags: [S3 User]
      summary: Create or update an RGW user (upsert)
      description: Mirrors radosgw-admin user create/modify with sensible defaults.
      operationId: upsertS3User
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrUpdateS3UserRequest' }
      responses:
        "200":
          description: OK (created or updated)
          content: { application/json: { schema: { $ref: '#/components/schemas/S3User' }}}
        "400": { description: Bad Request, content: { application/json: { schema: { $ref: '#/components/schemas/status_400_bad_request' }}}}
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/status_401_unauthorized' }}}}
        "403": { description: Forbidden,    content: { application/json: { schema: { $ref: '#/components/schemas/status_403_forbidden' }}}}
        "500": { description: Internal Server Error, content: { application/json: { schema: { $ref: '#/components/schemas/status_500_internal_server_error' }}}}

  /s3/user/{uid}:
    get:
      tags: [S3 User]
      summary: Get RGW user
      operationId: getS3User
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: uid
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/S3User' }}}}
        "404": { description: Not Found, content: { application/json: { schema: { $ref: '#/components/schemas/status_404_not_found' }}}}
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/status_401_unauthorized' }}}}
        "403": { description: Forbidden,    content: { application/json: { schema: { $ref: '#/components/schemas/status_403_forbidden' }}}}
        "500": { description: Internal Server Error, content: { application/json: { schema: { $ref: '#/components/schemas/status_500_internal_server_error' }}}}

    delete:
      tags: [S3 User]
      summary: Delete RGW user
      operationId: deleteS3User
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: uid
          required: true
          schema: { type: string }
        - in: query
          name: purge_data
          required: false
          schema: { type: boolean, default: false }
          description: Also purge buckets/objects owned by the user (dangerous)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/status_200_ok_no_content' }}}}
        "404": { description: Not Found, content: { application/json: { schema: { $ref: '#/components/schemas/status_404_not_found' }}}}
        "400": { description: Bad Request, content: { application/json: { schema: { $ref: '#/components/schemas/status_400_bad_request' }}}}

  /s3/user/{uid}/keys:
    get:
      tags: [S3 User]
      summary: List S3 access keys for a user
      operationId: listS3UserKeys
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: uid
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/S3KeyPair' }}}}}
        "404": { description: Not Found, content: { application/json: { schema: { $ref: '#/components/schemas/status_404_not_found' }}}}

    post:
      tags: [S3 User]
      summary: Create or set an access key
      description: If `access_key` and `secret_key` omitted, a new pair is generated.
      operationId: createS3UserKey
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: uid
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateS3KeyRequest' }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/S3KeyPair' }}}}
        "404": { description: Not Found, content: { application/json: { schema: { $ref: '#/components/schemas/status_404_not_found' }}}}

    delete:
      tags: [S3 User]
      summary: Delete an access key
      operationId: deleteS3UserKey
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: uid
          required: true
          schema: { type: string }
        - in: query
          name: access_key
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/status_200_ok_no_content' }}}}
        "404": { description: Not Found, content: { application/json: { schema: { $ref: '#/components/schemas/status_404_not_found' }}}}

  /s3/user/{uid}/quota:
    get:
      tags: [S3 User]
      summary: Get user & bucket quota
      operationId: getS3Quota
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: uid
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/S3Quota' }}}}
        "404": { description: Not Found, content: { application/json: { schema: { $ref: '#/components/schemas/status_404_not_found' }}}}

    put:
      tags: [S3 User]
      summary: Set user and/or bucket quota
      operationId: setS3Quota
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: uid
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/S3QuotaRequest' }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/status_200_ok_no_content' }}}}
        "400": { description: Bad Request, content: { application/json: { schema: { $ref: '#/components/schemas/status_400_bad_request' }}}}

  # ---------- S3 BUCKETS ----------
  /s3/bucket:
    get:
      tags: [S3 Bucket]
      summary: List buckets (optionally by owner)
      operationId: listS3Buckets
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: query
          name: uid
          required: false
          schema: { type: string }
          description: If provided, returns buckets owned by this user only
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/S3BucketList' }}}}

    post:
      tags: [S3 Bucket]
      summary: Create a bucket
      operationId: createS3Bucket
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateS3BucketRequest' }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/S3Bucket' }}}}
        "400": { description: Bad Request, content: { application/json: { schema: { $ref: '#/components/schemas/status_400_bad_request' }}}}

  /s3/bucket/{bucket}:
    get:
      tags: [S3 Bucket]
      summary: Get bucket stats/owner/placement
      operationId: getS3Bucket
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: bucket
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/S3Bucket' }}}}
        "404": { description: Not Found, content: { application/json: { schema: { $ref: '#/components/schemas/status_404_not_found' }}}}

    delete:
      tags: [S3 Bucket]
      summary: Delete a bucket
      description: Optionally purge objects prior to deletion.
      operationId: deleteS3Bucket
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: bucket
          required: true
          schema: { type: string }
        - in: query
          name: purge_objects
          required: false
          schema: { type: boolean, default: false }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/status_200_ok_no_content' }}}}
        "409":
          description: Conflict (bucket not empty and purge not requested)
          content: { application/json: { schema: { $ref: '#/components/schemas/status_400_bad_request' }}}

  /s3/bucket/{bucket}/versioning:
    put:
      tags: [S3 Bucket]
      summary: Enable/disable versioning
      operationId: setS3BucketVersioning
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: bucket
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/S3BucketVersioningRequest' }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/status_200_ok_no_content' }}}}

  /s3/bucket/{bucket}/quota:
    put:
      tags: [S3 Bucket]
      summary: Set bucket-level quota
      operationId: setS3BucketQuota
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: bucket
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/S3BucketQuotaRequest' }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/status_200_ok_no_content' }}}}

  # ---------- POLICIES / ACL ----------
  /s3/bucket/{bucket}/policy:
    get:
      tags: [S3 Policy]
      summary: Get bucket policy (IAM JSON)
      operationId: getS3BucketPolicy
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: bucket
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/S3PolicyDocument' }}}}
        "404": { description: Not Found, content: { application/json: { schema: { $ref: '#/components/schemas/status_404_not_found' }}}}

    put:
      tags: [S3 Policy]
      summary: Set/replace bucket policy (IAM JSON)
      operationId: putS3BucketPolicy
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: bucket
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/S3PolicyDocument' }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/status_200_ok_no_content' }}}}
        "400": { description: Bad policy document, content: { application/json: { schema: { $ref: '#/components/schemas/status_400_bad_request' }}}}

    delete:
      tags: [S3 Policy]
      summary: Delete bucket policy
      operationId: deleteS3BucketPolicy
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: bucket
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/status_200_ok_no_content' }}}}

  /s3/bucket/{bucket}/acl:
    get:
      tags: [S3 Policy]
      summary: Get bucket ACL (Canned or XML)
      operationId: getS3BucketAcl
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: bucket
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/S3Acl' }
            application/xml:
              schema: { type: string }

    put:
      tags: [S3 Policy]
      summary: Set bucket ACL (Canned or XML)
      operationId: putS3BucketAcl
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: bucket
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/S3Acl' }
          application/xml:
            schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/status_200_ok_no_content' }}}}


  /version:
    get:
      tags: [version]
      summary: Version
      description: Version
      operationId: version_get
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/version'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cluster/info:
    get:
      tags: [Cluster Info]
      summary: Get FSID and monitor endpoints for all clusters
      operationId: listClusterInfo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterInfoList"
        "400":
          description: Bad Request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_400_bad_request' }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_401_unauthorized' }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_403_forbidden' }
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_500_internal_server_error' }

  /cluster/user:
    get:
      tags: [Cluster User]
      summary: List all CephX users
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/users"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

    post:
      tags: [Cluster User]
      summary: Upsert a CephX user with cluster-specific capabilities (templated)
      description: >
        Creates or updates a CephX user and synchronizes the SAME SECRET across clusters.
        Capability strings may include placeholders `{fs}`, `{path}`, `{group}`, `{subvol}` which
        are rendered per cluster using subvolume info (getpath).
      operationId: applyUserTemplated
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserTemplatedRequest'
      responses:
        "200":
          description: Summary of synchronization results and per-cluster applied caps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyUserResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found (e.g., subvolume missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

    put:
      tags: [Cluster User]
      summary: Overwrite capabilities for an existing CephX user (non-templated)
      description: >
        Overwrites a user's capabilities with the provided list. Commonly used to adjust a single
        component (e.g., `mds`) while preserving others (`mon`, `osd`, `mgr`).
      operationId: overwriteUserCaps
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserCapsRequest'
      responses:
        "200":
          description: OK (caps updated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "201":
          description: Created (if implementation creates missing user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cluster/user/{entity}:
    delete:
      tags: [Cluster User]
      summary: Delete a CephX user
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: entity
          required: true
          schema:
            type: string
          description: CephX entity, e.g., `client.demo`
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cluster/user/export:
    post:
      tags: [Cluster User]
      summary: Export keyring(s) for one or more CephX users
      operationId: exportUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportUsersRequest'
            examples:
              single:
                value:
                  entities: ["client.demo"]
              multiple:
                value:
                  entities: ["client.alice","client.bob"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportUsersResponse"
            text/plain:
              schema:
                type: string
              examples:
                concatenated:
                  value: |
                    [client.kthare10_0011904101]
                        key = AQApM+Bo...
                        caps mds = "allow ..."
                        ...
                    [client.pruth_0031379841]
                        key = AQAXPuBo...
                        caps mds = "allow ..."
                        ...

  /cephfs/subvolume/{vol_name}:
    get:
      tags: [CephFS]
      summary: List subvolumes
      description: |
        Lists subvolumes for a filesystem. If `group_name` is passed, results
        are filtered to that group. When `info=true`, implementations may
        return detailed objects instead of simple names.
      operationId: listSubvolumes
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema: { type: string }
          description: CephFS volume name (filesystem)
        - in: query
          name: group_name
          required: false
          schema: { type: string }
        - in: query
          name: info
          required: false
          schema:
            type: boolean
            default: false
          description: When true, return detailed objects per subvolume if supported.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubvolumeList' }
        "400":
          description: Bad Request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_400_bad_request' }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_401_unauthorized' }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_403_forbidden' }
        "404":
          description: Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_404_not_found' }
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_500_internal_server_error' }

    put:
      tags: [CephFS]
      summary: Create or resize a subvolume
      description: >
        Creates a new subvolume (if it does not exist) or resizes an existing one.
        Omit `size` to create without a quota (unlimited). Send `size` (bytes) to set/resize the quota.
      operationId: createOrResizeSubvolume
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema:
            type: string
          description: CephFS volume name (filesystem), e.g. `CEPH-FS-01`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubvolumeCreateOrResizeRequest'
            examples:
              createNoQuota:
                value:
                  subvol_name: alice
                  group_name: fabric_staff
                  mode: "0777"
              createWithQuota:
                value:
                  subvol_name: bob
                  group_name: fabric_staff
                  size: 10737418240
                  mode: "0770"
              resize:
                value:
                  subvol_name: bob
                  group_name: fabric_staff
                  size: 536870912
      responses:
        "200":
          description: OK (created or resized)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

    delete:
      tags: [CephFS]
      summary: Delete a subvolume
      operationId: deleteSubvolume
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema:
            type: string
          description: CephFS volume name (filesystem)
        - in: query
          name: subvol_name
          required: true
          schema:
            type: string
        - in: query
          name: group_name
          required: false
          schema:
            type: string
        - in: query
          name: force
          required: false
          schema:
            type: boolean
            default: false
          description: Force delete even if snapshots exist (behavior depends on cluster policy)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cephfs/subvolume/{vol_name}/info:
    get:
      tags: [CephFS]
      summary: Get subvolume info (path)
      description: Returns subvolume details; use the `path` field as the mount path (equivalent to `getpath`).
      operationId: getSubvolumeInfo
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema:
            type: string
          description: CephFS volume name (filesystem)
        - in: query
          name: subvol_name
          required: true
          schema:
            type: string
        - in: query
          name: group_name
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cephfs/subvolume/{vol_name}/exists:
    get:
      tags: [CephFS]
      summary: Check whether a subvolume exists
      operationId: subvolumeExists
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema:
            type: string
        - in: query
          name: subvol_name
          required: true
          schema:
            type: string
        - in: query
          name: group_name
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubvolumeExists'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

  /cephfs/subvolume/group/{vol_name}:
    get:
      tags: [CephFS]
      summary: List subvolume groups
      description: |
        Lists subvolume groups for a filesystem. When `info=true`, implementations
        may return detailed objects per group; otherwise names.
      operationId: listSubvolumeGroups
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema: { type: string }
          description: CephFS volume name (filesystem)
        - in: query
          name: info
          required: false
          schema:
            type: boolean
            default: false
          description: When true, return detailed objects per group if supported.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubvolumeGroupList' }
        "400":
          description: Bad Request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_400_bad_request' }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_401_unauthorized' }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_403_forbidden' }
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/status_500_internal_server_error' }
    delete:
      tags: [CephFS]
      summary: Delete a subvolume group
      operationId: deleteSubvolumeGroup
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/clusterParam'
        - in: path
          name: vol_name
          required: true
          schema:
            type: string
          description: CephFS volume name (filesystem)
        - in: query
          name: group_name
          required: false
          schema:
            type: string
        - in: query
          name: force
          required: false
          schema:
            type: boolean
            default: false
          description: Force delete even if snapshots exist (behavior depends on cluster policy)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_200_ok_no_content'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_400_bad_request'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_401_unauthorized'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_403_forbidden'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_404_not_found'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status_500_internal_server_error'

components:

  parameters:
    clusterParam:
      name: cluster
      in: query
      required: true
      description: Target cluster/region identifier as defined by the service config.
      schema:
        type: string
        example: europe

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # -------- Status / Version --------
    version:
      type: object
      allOf:
        - $ref: '#/components/schemas/status_200_ok_single'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/version_data'
    version_data:
      required: [reference, version]
      properties:
        reference:
          type: string
          example: https://github.com/fabric-testbed/fabric_ceph
        version:
          type: string
          example: 1.0.0
      example: null

    status_200_ok_single:
      type: object
      properties:
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 200
        type:
          type: string

    status_200_ok_no_content:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/status_200_ok_no_content_data'
        type:
          type: string
          default: no_content
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 200

    status_200_ok_paginated:
      type: object
      properties:
        limit:
          type: integer
        offset:
          type: integer
        size:
          type: integer
        status:
          type: integer
          default: 200
        total:
          type: integer
        type:
          type: string

    status_400_bad_request:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/status_400_bad_request_errors'

    status_401_unauthorized:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/status_401_unauthorized_errors'
        type:
          type: string
          default: error
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 401

    status_403_forbidden:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/status_403_forbidden_errors'
        type:
          type: string
          default: error
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 403

    status_404_not_found:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/status_404_not_found_errors'
        type:
          type: string
          default: error
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 404

    status_500_internal_server_error:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/status_500_internal_server_error_errors'
        type:
          type: string
          default: error
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 500

    status_200_ok_no_content_data:
      type: object
      properties:
        message:
          type: string
          default: No Content
        details:
          type: object
      example:
        details: details
        message: No Content

    status_400_bad_request_errors:
      type: object
      properties:
        message:
          type: string
          default: Bad Request
        details:
          type: string
        type:
          type: string
          default: error
        size:
          type: integer
          default: 1
        status:
          type: integer
          default: 400
      example: null

    status_401_unauthorized_errors:
      type: object
      properties:
        message:
          type: string
          default: Unauthorized
        details:
          type: string
      example: null

    status_403_forbidden_errors:
      type: object
      properties:
        message:
          type: string
          default: Forbidden
        details:
          type: string
      example: null

    status_404_not_found_errors:
      type: object
      properties:
        message:
          type: string
          default: Not Found
        details:
          type: string
      example: null

    status_500_internal_server_error_errors:
      type: object
      properties:
        message:
          type: string
          default: Internal Server Error
        details:
          type: string
      example: null

    # -------- Users / Caps --------
    Capability:
      type: object
      required: [entity, cap]
      properties:
        entity:
          type: string
          description: One of mon|osd|mds|mgr (commonly mon/osd/mds)
          example: mds
        cap:
          type: string
          description: Capability string, e.g. `allow rw`, `allow r fsname=CEPH-FS-01 path=/volumes/_nogroup/demo`
          example: "allow rw"

    CapabilityKV:
      type: object
      required: [type, value]
      properties:
        type:
          type: string
          description: One of mon|osd|mds|mgr
          example: mds
        value:
          type: string
          description: Capability string, e.g. `allow rw`, `allow r fsname=CEPH-FS-01 path=/volumes/_nogroup/demo`
          example: "allow rw fsname=CEPH-FS-01 path=/volumes/_nogroup/demo"

    CapabilityTemplate:
      type: object
      required: [entity, cap]
      properties:
        entity: { type: string, example: mds, description: "One of mon|osd|mds|mgr" }
        cap:    { type: string, example: "allow rw fsname={fs} path={path}" }

    CapRenderContext:
      type: object
      required: [fs_name, subvol_name]
      properties:
        fs_name:     { type: string, example: CEPH-FS-01 }
        subvol_name: { type: string, example: project123 }
        group_name:  { type: string, nullable: true, example: fabric_staff }

    CreateUserTemplatedRequest:
      type: object
      required: [user_entity, template_capabilities, renders]
      properties:
        user_entity:
          type: string
          example: client.project123
        template_capabilities:
          type: array
          items: { $ref: '#/components/schemas/CapabilityTemplate' }
        renders:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/CapRenderContext' }
          description: >
            Multiple subvolumes (possibly in different groups). Server will expand the MDS
            template for each context and merge them into one 'mds' cap string using commas.
        mergeStrategy:
          type: string
          enum: [multi, replace]
          default: multi
        sync_across_clusters:
          type: boolean
          default: true
        preferred_source:
          type: string
          example: europe
          description: Preferred source cluster when user doesn't already exist.

    UpdateUserCapsRequest:
      type: object
      required: [user_entity, capabilities]
      properties:
        user_entity:
          type: string
          example: client.demo
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityKV'
          description: >
            Complete set of caps to apply (overwrites existing). Provide one entry per component.

    ApplyUserResponse:
      type: object
      properties:
        user_entity: { type: string, example: client.project123 }
        fs_name:     { type: string, example: CEPH-FS-01 }
        subvol_name: { type: string, example: project123 }
        group_name:  { type: string, nullable: true }
        source_cluster:     { type: string, example: europe }
        created_on_source:  { type: boolean }
        updated_on_source:  { type: boolean }
        imported_to:
          type: array
          items: { type: string }
          description: Clusters where the keyring was imported
        caps_applied:
          type: object
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/Capability' }
          description: Map cluster → rendered caps actually applied
        paths:
          type: object
          additionalProperties: { type: string }
          description: Map cluster → resolved subvolume path
        errors:
          type: object
          additionalProperties: { type: string }
          description: Map cluster → error string (if any)

    users:
      type: object
      allOf:
        - $ref: '#/components/schemas/status_200_ok_paginated'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CephUser'

    CephUser:
      type: object
      properties:
        user_entity:
          type: string
          example: client.demo
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/Capability'
        keys:
          type: array
          items:
            type: object
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true

    ExportUsersRequest:
      type: object
      required: [entities]
      properties:
        entities:
          type: array
          description: List of CephX entities to export
          items:
            type: string
          example: ["client.demo","client.alice"]

    ExportUsersResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/status_200_ok_single'
        - type: object
          properties:
            type:
              type: string
              default: keyrings
            clusters:
              $ref: '#/components/schemas/ClusterKeyringsMap'

    ClusterKeyringsMap:
      description: Map of cluster name → keyring map
      type: object
      additionalProperties:
        $ref: '#/components/schemas/EntityKeyringMap'

    EntityKeyringMap:
      description: Map of CephX entity → keyring text
      type: object
      additionalProperties:
        type: string

    # -------- CephFS / Subvolumes --------
    SubvolumeCreateOrResizeRequest:
      type: object
      required: [subvol_name]
      properties:
        subvol_name:
          type: string
          description: Subvolume name to create or resize
        group_name:
          type: string
          description: Optional subvolume group name
        size:
          type: integer
          format: int64
          description: >
            Quota in **bytes**. Omit to create without quota (unlimited).
            Send a value to set or resize quota.
          example: 10737418240
        mode:
          type: string
          description: >
            POSIX mode string for initial create (octal), e.g. `"0777"`. Ignored on resize.
          pattern: "^[0-7]{3,4}$"
          example: "0777"

    SubvolumeExists:
      type: object
      properties:
        exists:
          type: boolean
      example:
        exists: true

    SubvolumeSummary:
      type: object
      description: Minimal subvolume info when `info=true` is supported.
      properties:
        name:        { type: string, example: alice }
        group_name:  { type: string, nullable: true, example: fabric_staff }
        path:        { type: string, nullable: true, example: /volumes/_nogroup/alice/uuid }
        bytes_quota: { type: integer, format: int64, nullable: true, example: 10737418240 }
        bytes_used:  { type: integer, format: int64, nullable: true, example: 1048576 }
        state:       { type: string, nullable: true, example: complete }

    SubvolumeList:
      type: object
      allOf:
        - $ref: '#/components/schemas/status_200_ok_paginated'
        - type: object
          properties:
            type:
              type: string
              example: subvolumes
            data:
              type: array
              description: |
                When `info=false` (default), items are names (strings).
                When `info=true`, items may be detailed objects.
              items:
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/SubvolumeSummary'

    SubvolumeGroupSummary:
      type: object
      description: Minimal subvolume group info when `info=true` is supported.
      properties:
        group_name: { type: string, example: fabric_staff }
        path:       { type: string, nullable: true, example: /volumes/fabric_staff }

    SubvolumeGroupList:
      type: object
      allOf:
        - $ref: '#/components/schemas/status_200_ok_paginated'
        - type: object
          properties:
            type:
              type: string
              example: subvolume_groups
            data:
              type: array
              description: |
                When `info=false`, items are names (strings).
                When `info=true`, items may be detailed objects.
              items:
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/SubvolumeGroupSummary'

    # -------- Cluster Info --------
    ClusterInfoList:
      allOf:
        - $ref: '#/components/schemas/status_200_ok_paginated'
        - type: object
          properties:
            type:
              type: string
              example: cluster_info
            data:
              type: array
              items:
                $ref: '#/components/schemas/ClusterInfoItem'

    ClusterInfoItem:
      type: object
      properties:
        cluster:
          type: string
          example: europe
        fsid:
          type: string
          example: "13371194-879b-11f0-b06f-fa163e08d592"
        mons:
          type: array
          items:
            type: object
            properties:
              name: { type: string, example: mon.a }
              v2:   { type: string, nullable: true, example: "10.138.254.2:3300/0" }
              v1:   { type: string, nullable: true, example: "10.138.254.2:6789/0" }
        mon_host:
          type: string
          example: "[v2:10.138.254.2:3300/0,v1:10.138.254.2:6789/0] [v2:10.135.254.2:3300/0,v1:10.135.254.2:6789/0]"
        ceph_conf_minimal:
          type: string
          example: |
            [global]
              fsid = 13371194-879b-11f0-b06f-fa163e08d592
              mon_host = [v2:10.138.254.2:3300/0,v1:10.138.254.2:6789/0] [v2:10.135.254.2:3300/0,v1:10.135.254.2:6789/0]
        error:
          type: string
          nullable: true

    # --------- S3 USERS ----------
    S3UserList:
      allOf:
        - $ref: '#/components/schemas/status_200_ok_paginated'
        - type: object
          properties:
            type: { type: string, example: s3_users }
            data:
              type: array
              items: { $ref: '#/components/schemas/S3User' }

    S3User:
      type: object
      properties:
        uid:           { type: string, example: demo }
        display_name:  { type: string, example: Demo User }
        email:         { type: string, nullable: true, example: demo@example.org }
        max_buckets:   { type: integer, example: 1000 }
        suspended:     { type: boolean, default: false }
        caps:
          type: array
          description: RGW admin caps (if enabled); not IAM
          items:
            type: object
            properties:
              type:  { type: string, example: buckets }
              perm:  { type: string, example: "*"}
        keys:
          type: array
          items: { $ref: '#/components/schemas/S3KeyPair' }
        user_quota:    { $ref: '#/components/schemas/S3QuotaEntry' }
        bucket_quota:  { $ref: '#/components/schemas/S3QuotaEntry' }
        system:        { type: boolean, default: false }
        op_mask:       { type: string, nullable: true }

    CreateOrUpdateS3UserRequest:
      type: object
      required: [uid]
      properties:
        uid:          { type: string, example: project123 }
        display_name: { type: string, example: "Project 123 Service Account" }
        email:        { type: string, nullable: true }
        suspended:    { type: boolean, default: false }
        max_buckets:  { type: integer, default: 1000 }
        system:       { type: boolean, default: false }
        op_mask:      { type: string, nullable: true }
        caps:
          type: array
          items:
            type: object
            properties:
              type: { type: string, example: users }   # users|buckets|metadata|usage|zone
              perm: { type: string, example: "*"}      # read|write|*
        keys:
          type: array
          items: { $ref: '#/components/schemas/CreateS3KeyRequest' }
          description: Optional explicit keypairs to set; omit to auto-generate none.

    S3KeyPair:
      type: object
      properties:
        user:        { type: string, example: project123 }
        access_key:  { type: string, example: AKIA... }
        secret_key:  { type: string, example: very-secret }
        status:      { type: string, example: active }

    CreateS3KeyRequest:
      type: object
      properties:
        access_key:  { type: string, nullable: true }
        secret_key:  { type: string, nullable: true }
        generate:    { type: boolean, default: true }

    S3Quota:
      type: object
      properties:
        user_quota:   { $ref: '#/components/schemas/S3QuotaEntry' }
        bucket_quota: { $ref: '#/components/schemas/S3QuotaEntry' }

    S3QuotaEntry:
      type: object
      properties:
        enabled:     { type: boolean, default: false }
        max_size_kb: { type: integer, nullable: true, example: 104857600 }
        max_objects: { type: integer, nullable: true, example: 1000000 }

    S3QuotaRequest:
      type: object
      properties:
        user_quota:   { $ref: '#/components/schemas/S3QuotaEntry' }
        bucket_quota: { $ref: '#/components/schemas/S3QuotaEntry' }

    # --------- S3 BUCKETS ----------
    S3BucketList:
      allOf:
        - $ref: '#/components/schemas/status_200_ok_paginated'
        - type: object
          properties:
            type: { type: string, example: s3_buckets }
            data:
              type: array
              items:
                type: object
                properties:
                  name:  { type: string, example: my-bucket }
                  owner: { type: string, example: project123 }

    S3Bucket:
      type: object
      properties:
        name:
          { type: string, example: my-bucket }
        owner:
          { type: string, example: project123 }
        num_objects:
          { type: integer, example: 42 }
        size_kb:
          { type: integer, example: 8192 }
        placement_rule:
          { type: string, nullable: true, example: default-placement }
        zonegroup:     { type: string, nullable: true, example: us-east }
        zone:          { type: string, nullable: true, example: us-east-1a }
        versioning:    { type: string, enum: [Enabled, Suspended, Disabled], example: Disabled }

    CreateS3BucketRequest:
      type: object
      required: [bucket, uid]
      properties:
        bucket:         { type: string, example: my-bucket }
        uid:            { type: string, example: project123, description: Owner uid }
        placement_rule: { type: string, nullable: true }
        versioning:     { type: string, enum: [Enabled, Suspended, Disabled], default: Disabled }

    S3BucketVersioningRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [Enabled, Suspended, Disabled] }

    S3BucketQuotaRequest:
      type: object
      properties:
        enabled:     { type: boolean, default: true }
        max_size_kb: { type: integer, nullable: true }
        max_objects: { type: integer, nullable: true }

    # --------- POLICIES / ACL ----------
    S3PolicyDocument:
      type: object
      description: Standard S3-style IAM policy JSON for a bucket.
      additionalProperties: true
      example:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: [ "s3:GetObject" ]
            Resource: "arn:aws:s3:::my-bucket/*"

    S3Acl:
      type: object
      description: Canned ACL or parsed ACL structure.
      properties:
        canned:
          type: string
          nullable: true
          description: One of private|public-read|public-read-write|authenticated-read
          example: public-read
        grants:
          type: array
          nullable: true
          items:
            type: object
            properties:
              grantee: { type: string, example: "uri:http://acs.amazonaws.com/groups/global/AllUsers" }
              permission: { type: string, example: READ }