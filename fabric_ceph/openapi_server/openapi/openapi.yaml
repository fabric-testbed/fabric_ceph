      example:
        reference: https://github.com/fabric-testbed/fabric_ceph
        version: 1.0.0
      properties:
        reference:
          example: https://github.com/fabric-testbed/fabric_ceph
          title: reference
          type: string
        version:
          example: 1.0.0
          title: version
          type: string
      required:
      - reference
      - version
      title: version_data
