openapi: 3.0.3
info:
  description: |
    Minimal OpenAPI definition for building an app around Ceph Dashboard REST endpoints used to
    manage CephX users and CephFS subvolumes, and to authenticate via JWT. These paths mirror the
    documented `/api` surface (as commonly exposed by the Ceph Dashboard).
  title: Ceph Dashboard – Auth & Cluster User API
  version: 1.0.0
servers:
- description: Local development server
  url: http://localhost:3500
- description: SwaggerHub API Auto Mocking
  url: https://virtserver.swaggerhub.com/RENCI3/ceph/1.0.0
- url: "https://{host}:{port}/api"
  variables:
    host:
      default: mgr.example.org
    port:
      default: "8443"
tags:
- name: Cluster Info
- name: Cluster User
- name: CephFS
- name: version
- name: S3 User
- name: S3 Bucket
- name: S3 Policy
paths:
  /cephfs/subvolume/group/{vol_name}:
    delete:
      operationId: delete_subvolume_group
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      - description: CephFS volume name (filesystem)
        explode: false
        in: path
        name: vol_name
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: group_name
        required: false
        schema:
          type: string
        style: form
      - description: Force delete even if snapshots exist (behavior depends on cluster
          policy)
        explode: true
        in: query
        name: force
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_200_ok_no_content"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_404_not_found"
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Delete a subvolume group
      tags:
      - CephFS
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.ceph_fs_controller
    get:
      description: |
        Lists subvolume groups for a filesystem. When `info=true`, implementations
        may return detailed objects per group; otherwise names.
      operationId: list_subvolume_groups
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      - description: CephFS volume name (filesystem)
        explode: false
        in: path
        name: vol_name
        required: true
        schema:
          type: string
        style: simple
      - description: "When true, return detailed objects per group if supported."
        explode: true
        in: query
        name: info
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubvolumeGroupList"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: List subvolume groups
      tags:
      - CephFS
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.ceph_fs_controller
  /cephfs/subvolume/{vol_name}:
    delete:
      operationId: delete_subvolume
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      - description: CephFS volume name (filesystem)
        explode: false
        in: path
        name: vol_name
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: subvol_name
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: group_name
        required: false
        schema:
          type: string
        style: form
      - description: Force delete even if snapshots exist (behavior depends on cluster
          policy)
        explode: true
        in: query
        name: force
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_200_ok_no_content"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_404_not_found"
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Delete a subvolume
      tags:
      - CephFS
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.ceph_fs_controller
    get:
      description: |
        Lists subvolumes for a filesystem. If `group_name` is passed, results
        are filtered to that group. When `info=true`, implementations may
        return detailed objects instead of simple names.
      operationId: list_subvolumes
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      - description: CephFS volume name (filesystem)
        explode: false
        in: path
        name: vol_name
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: group_name
        required: false
        schema:
          type: string
        style: form
      - description: "When true, return detailed objects per subvolume if supported."
        explode: true
        in: query
        name: info
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubvolumeList"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_404_not_found"
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: List subvolumes
      tags:
      - CephFS
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.ceph_fs_controller
    put:
      description: |
        Creates a new subvolume (if it does not exist) or resizes an existing one. Omit `size` to create without a quota (unlimited). Send `size` (bytes) to set/resize the quota.
      operationId: create_or_resize_subvolume
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      - description: "CephFS volume name (filesystem), e.g. `CEPH-FS-01`"
        explode: false
        in: path
        name: vol_name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              createNoQuota:
                value:
                  subvol_name: alice
                  group_name: fabric_staff
                  mode: "0777"
              createWithQuota:
                value:
                  subvol_name: bob
                  group_name: fabric_staff
                  size: 10737418240
                  mode: "0770"
              resize:
                value:
                  subvol_name: bob
                  group_name: fabric_staff
                  size: 536870912
            schema:
              $ref: "#/components/schemas/SubvolumeCreateOrResizeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_200_ok_no_content"
          description: OK (created or resized)
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_200_ok_no_content"
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_404_not_found"
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Create or resize a subvolume
      tags:
      - CephFS
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.ceph_fs_controller
  /cephfs/subvolume/{vol_name}/exists:
    get:
      operationId: subvolume_exists
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      - explode: false
        in: path
        name: vol_name
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: subvol_name
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: group_name
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubvolumeExists"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Check whether a subvolume exists
      tags:
      - CephFS
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.ceph_fs_controller
  /cephfs/subvolume/{vol_name}/info:
    get:
      description: Returns subvolume details; use the `path` field as the mount path
        (equivalent to `getpath`).
      operationId: get_subvolume_info
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      - description: CephFS volume name (filesystem)
        explode: false
        in: path
        name: vol_name
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: subvol_name
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: group_name
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_200_ok_no_content"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_404_not_found"
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Get subvolume info (path)
      tags:
      - CephFS
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.ceph_fs_controller
  /cluster/info:
    get:
      operationId: list_cluster_info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterInfoList"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Get FSID and monitor endpoints for all clusters
      tags:
      - Cluster Info
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.cluster_info_controller
  /cluster/user:
    get:
      operationId: list_users
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/users"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_404_not_found"
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: List all CephX users
      tags:
      - Cluster User
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.cluster_user_controller
    post:
      description: |
        Creates or updates a CephX user and synchronizes the SAME SECRET across clusters. Capability strings may include placeholders `{fs}`, `{path}`, `{group}`, `{subvol}` which are rendered per cluster using subvolume info (getpath).
      operationId: apply_user_templated
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserTemplatedRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyUserResponse"
          description: Summary of synchronization results and per-cluster applied
            caps
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_404_not_found"
          description: "Not Found (e.g., subvolume missing)"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Upsert a CephX user with cluster-specific capabilities (templated)
      tags:
      - Cluster User
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.cluster_user_controller
    put:
      description: |
        Overwrites a user's capabilities with the provided list. Commonly used to adjust a single component (e.g., `mds`) while preserving others (`mon`, `osd`, `mgr`).
      operationId: overwrite_user_caps
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserCapsRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_200_ok_no_content"
          description: OK (caps updated)
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_200_ok_no_content"
          description: Created (if implementation creates missing user)
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_200_ok_no_content"
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_404_not_found"
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Overwrite capabilities for an existing CephX user (non-templated)
      tags:
      - Cluster User
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.cluster_user_controller
  /cluster/user/export:
    post:
      operationId: export_users
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      requestBody:
        content:
          application/json:
            examples:
              single:
                value:
                  entities:
                  - client.demo
              multiple:
                value:
                  entities:
                  - client.alice
                  - client.bob
            schema:
              $ref: "#/components/schemas/ExportUsersRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportUsersResponse"
            text/plain:
              examples:
                concatenated:
                  value: |
                    [client.kthare10_0011904101]
                        key = AQApM+Bo...
                        caps mds = "allow ..."
                        ...
                    [client.pruth_0031379841]
                        key = AQAXPuBo...
                        caps mds = "allow ..."
                        ...
              schema:
                type: string
          description: OK
      security:
      - bearerAuth: []
      summary: Export keyring(s) for one or more CephX users
      tags:
      - Cluster User
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.cluster_user_controller
  /cluster/user/{entity}:
    delete:
      operationId: delete_user
      parameters:
      - description: Target cluster/region identifier as defined by the service config.
        explode: true
        in: query
        name: cluster
        required: true
        schema:
          example: europe
          type: string
        style: form
      - description: "CephX entity, e.g., `client.demo`"
        explode: false
        in: path
        name: entity
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_200_ok_no_content"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_400_bad_request"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_401_unauthorized"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_403_forbidden"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_404_not_found"
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/status_500_internal_server_error"
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Delete a CephX user
      tags:
      - Cluster User
      x-openapi-router-controller: fabric_ceph.openapi_server.controllers.cluster_user_controller
  /project/members:
    get:
      operationId: list_project_members
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        uuid:
                          type: string
                        bastion_login:
                          type: string
                        membership_types:
                          type: array
